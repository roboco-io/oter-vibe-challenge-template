version: '3.8'

volumes:
    logs:
        driver: local
    db_data:
        driver: local

services:
    db:
        image: mariadb:10.5
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: conduit
            MYSQL_USER: conduit
            MYSQL_PASSWORD: conduit_dev_password
            MYSQL_ROOT_PASSWORD: root_dev_password
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_dev_password"]
            interval: 5s
            timeout: 5s
            retries: 20

    app:
        build: .
        working_dir: /var/www
        environment:
            docker: "true"
            APP_NAME: conduit
            APP_ENV: local
            APP_DEBUG: "true"
            APP_URL: http://localhost
            APP_LOG_LEVEL: debug
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: conduit
            DB_USERNAME: conduit
            DB_PASSWORD: conduit_dev_password
            JWT_SECRET: dev-only-jwt-secret-do-not-use-in-production
            CORS_ALLOWED_ORIGINS: "*"
        depends_on:
            db:
                condition: service_healthy
        ports:
            - 8080:8080
        volumes:
            - logs:/var/www/logs
